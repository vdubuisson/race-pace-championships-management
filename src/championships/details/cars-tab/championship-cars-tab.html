@for (category of championship().classes; track category.id) {
  @let categoryCars = carsByCategory().get(category.id) ?? [];
  <h2 tuiHeader class="tab-header">
    <span>{{ category.name }}</span>
    <div class="separator"></div>
    <span tuiSubtitle>{{ categoryCars.length }}/{{ cars().length }} cars</span>
  </h2>

  <div class="cars-list">
    @for (car of categoryCars; track car.id) {
      <app-car-card [car]="car" />
    }
  </div>
}
