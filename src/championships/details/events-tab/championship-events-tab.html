<div tuiCell>
  <div tuiTitle="m">
    Championship events: {{ events().length }}/{{ championship().events_count }}
  </div>
  <div class="subtitle">
    <div tuiAvatar="@tui.star" appearance="warning"></div>
    <span>Mandatory: {{ mandatoryEventsCount() }}</span>
    <div class="separator"></div>
    <div tuiAvatar="?" appearance="info"></div>
    <span>Optional: {{ optionalEventsCount() }}</span>
  </div>
</div>

<div class="events-list">
  @for (event of events(); track event.id) {
    <app-event-card [event]="event" />
  }
</div>
