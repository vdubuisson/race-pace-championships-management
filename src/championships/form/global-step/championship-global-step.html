<form tuiForm [formGroup]="form()" class="global-form">
  <fieldset class="grid2-1">
    <div class="form-field">
      <label tuiLabel>
        Name
        <tui-textfield>
          <input tuiInput placeholder="My championship" formControlName="name" />
        </tui-textfield>
      </label>
      <tui-error formControlName="name" />
    </div>

    <div class="form-field">
      <label tuiLabel>
        Period
        <fieldset class="with-separator">
          <tui-textfield>
            <input
              tuiInputYear
              placeholder="Start year"
              formControlName="start_year"
              [max]="startYearMax()"
            />
            <tui-calendar-year *tuiDropdown />
          </tui-textfield>
          <div class="separator">-</div>
          <tui-textfield>
            <input
              tuiInputYear
              placeholder="End year"
              formControlName="end_year"
              [min]="endYearMin()"
            />
            <tui-calendar-year *tuiDropdown />
          </tui-textfield>
        </fieldset>
      </label>
      <tui-error formControlName="start_year" />
    </div>
  </fieldset>

  <fieldset>
    <div class="form-field">
      <label tuiLabel>
        Categories
        <tui-textfield multi tuiChevron [stringify]="getCategoryName">
          <input
            tuiInputChip
            [placeholder]="form().controls.categories.value.length ? '' : 'Vehicle categories'"
            formControlName="categories"
          />
          <tui-input-chip *tuiItem />
          <tui-data-list *tuiDropdown tuiMultiSelectGroup>
            @for (cat of vehicleClasses() | tuiFilterByInput; track cat.id) {
              <button tuiOption type="button" [value]="cat.id">
                {{ cat.name }}
              </button>
            }
          </tui-data-list>
        </tui-textfield>
      </label>
      <tui-error formControlName="categories" />
    </div>

    <div class="form-field">
      <label tuiLabel>
        Tags
        <tui-textfield multi>
          <input tuiInputChip placeholder="Tag" formControlName="tags" />
          <tui-input-chip *tuiItem />
        </tui-textfield>
      </label>
      <tui-error formControlName="tags" />
    </div>
  </fieldset>

  <fieldset>
    <div class="form-field">
      <label tuiLabel>
        <span>
          New season (month/day)
          <tui-icon [tuiTooltip]="initTooltip" />
        </span>
        <fieldset class="grid2-1">
          <tui-textfield tuiChevron [tuiTextfieldCleaner]="false" [stringify]="getMonthName">
            <input tuiSelect formControlName="init_month" />
            <tui-data-list *tuiDropdown>
              @for (month of months; track month.id) {
                <button tuiOption type="button" [value]="month.id">
                  {{ month.name }}
                </button>
              }
            </tui-data-list>
          </tui-textfield>
          <tui-textfield>
            <input tuiInputNumber placeholder="Day" formControlName="init_day" />
          </tui-textfield>
        </fieldset>
      </label>
      <tui-error formControlName="init_day" />
    </div>

    <div class="form-field">
      <label tuiLabel>
        <span>
          Registration start (month/day)
          <tui-icon [tuiTooltip]="registrationStartTooltip" />
        </span>
        <fieldset class="grid2-1">
          <tui-textfield tuiChevron [tuiTextfieldCleaner]="false" [stringify]="getMonthName">
            <input tuiSelect formControlName="registration_start_month" />
            <tui-data-list *tuiDropdown>
              @for (month of months; track month.id) {
                <button tuiOption type="button" [value]="month.id">
                  {{ month.name }}
                </button>
              }
            </tui-data-list>
          </tui-textfield>
          <tui-textfield>
            <input tuiInputNumber placeholder="Day" formControlName="registration_start_day" />
          </tui-textfield>
        </fieldset>
      </label>
      <tui-error formControlName="registration_start_day" />
    </div>

    <div class="form-field">
      <label tuiLabel>
        <span>
          Registration end (month/day)
          <tui-icon [tuiTooltip]="registrationEndTooltip" />
        </span>
        <fieldset class="grid2-1">
          <tui-textfield tuiChevron [tuiTextfieldCleaner]="false" [stringify]="getMonthName">
            <input tuiSelect formControlName="registration_end_month" />
            <tui-data-list *tuiDropdown>
              @for (month of months; track month.id) {
                <button tuiOption type="button" [value]="month.id">
                  {{ month.name }}
                </button>
              }
            </tui-data-list>
          </tui-textfield>
          <tui-textfield>
            <input tuiInputNumber placeholder="Day" formControlName="registration_end_day" />
          </tui-textfield>
        </fieldset>
      </label>
      <tui-error formControlName="registration_end_day" />
    </div>
  </fieldset>

  <fieldset>
    <div class="form-field">
      <label tuiLabel>
        <span>
          Prestige
          <tui-icon [tuiTooltip]="prestigeTooltip" />
        </span>
        <tui-textfield>
          <input tuiInputNumber placeholder="Prestige" formControlName="prestige" />
        </tui-textfield>
      </label>
      <tui-error formControlName="prestige" />
    </div>

    <div class="form-field">
      <label tuiLabel>
        <span>
          Events count
          <tui-icon [tuiTooltip]="eventsCountTooltip" />
        </span>
        <tui-textfield>
          <input tuiInputNumber placeholder="Events count" formControlName="events_count" />
        </tui-textfield>
      </label>
      <tui-error formControlName="events_count" />
    </div>

    <div class="form-field">
      <label tuiLabel>
        Start type
        <tui-textfield tuiChevron [tuiTextfieldCleaner]="false" [stringify]="getTitleCase">
          <input tuiSelect formControlName="start_type" />
          <tui-data-list-wrapper *tuiDropdown [items]="['standing', 'rolling']" />
        </tui-textfield>
      </label>
      <tui-error formControlName="start_type" />
    </div>

    <fieldset class="vertical">
      <div class="form-field">
        <label tuiCell="s">
          <span tuiTitle>Mandatory pit stop</span>
          <input tuiSwitch formControlName="pit_stop" type="checkbox" />
        </label>
      </div>

      <div class="form-field">
        <label tuiCell="s">
          <span tuiTitle>Included by default</span>
          <input tuiSwitch formControlName="default_included" type="checkbox" />
        </label>
      </div>
    </fieldset>
  </fieldset>

  <div tuiTitle>Scoring system</div>
  <fieldset class="points">
    @for (pointControl of pointsForms.controls; track pointControl; let index = $index) {
      <div class="form-field">
        <label tuiLabel>
          {{ index + 1 | ordinal }} place
          <div tuiGroup>
            <tui-textfield>
              <input tuiInputNumber placeholder="Points" [formControl]="pointControl" />
            </tui-textfield>
            <button
              tuiIconButton
              type="button"
              appearance="textfield"
              iconStart="@tui.minus"
              class="point-btn minus"
              (click)="removePoint(index)"
              [disabled]="pointsForms.length <= 1"
            >
              Remove position
            </button>
          </div>
        </label>
        <tui-error [formControl]="pointControl" />
      </div>
    }
    <button
      tuiIconButton
      type="button"
      appearance="outline"
      iconStart="@tui.plus"
      class="point-btn"
      (click)="addPoint()"
    >
      Add position
    </button>
  </fieldset>
</form>
