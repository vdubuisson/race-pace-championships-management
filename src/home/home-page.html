<header tuiHeader="h1">
  <h1 tuiTitle>
    Race Pace Championships Management
    <span tuiSubtitle>The app to create/edit custom championships for the Race Pace app</span>
  </h1>
</header>

<div class="actions">
  <a [routerLink]="['/import']" tuiButton appearance="primary" iconStart="@tui.import">
    Import championships
  </a>
  <a [routerLink]="['/teams']" tuiButton appearance="primary" iconStart="@tui.users">
    View teams
  </a>
  <a [routerLink]="['/championships']" tuiButton appearance="primary" iconStart="@tui.trophy">
    View championships
  </a>
  <div tuiGroup class="import-buttons">
    <button
      tuiButton
      appearance="primary"
      type="button"
      [loading]="isExportingWithoutMods()"
      [disabled]="isExporting()"
      (click)="exportDataWithoutMods()"
    >
      <tui-icon icon="@tui.download" />
      Export without track mods
    </button>
    <button
      tuiButton
      appearance="primary"
      type="button"
      [loading]="isExportingWithMods()"
      [disabled]="isExporting()"
      (click)="exportDataWithMods()"
    >
      <tui-icon icon="@tui.download" badge="@tui.astroid" />
      Export with track mods
    </button>
  </div>
</div>
