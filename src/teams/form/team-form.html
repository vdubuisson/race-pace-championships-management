<a
  [routerLink]="['/teams']"
  appearance="outline"
  iconStart="@tui.chevron-left"
  size="xs"
  tuiButton
  class="back-btn"
>
  Back
</a>

<form tuiForm [formGroup]="teamForm" (submit)="onSubmit($event)">
  <header tuiHeader>
    <h1 tuiTitle>{{ pageTitle() }}</h1>
  </header>

  <fieldset>
    <div class="form-field">
      <label tuiLabel>
        Name
        <tui-textfield tuiTextfieldSize="m">
          <input tuiInput placeholder="Racing Team" [formControl]="teamForm.controls.name" />
        </tui-textfield>
      </label>
      <tui-error [formControl]="teamForm.controls.name" />
    </div>

    <div class="form-field">
      <label tuiLabel>
        Principal
        <tui-textfield tuiTextfieldSize="m">
          <input tuiInput placeholder="John Smith" [formControl]="teamForm.controls.principal" />
        </tui-textfield>
      </label>
      <tui-error [formControl]="teamForm.controls.principal" />
    </div>
  </fieldset>

  <fieldset>
    <div class="form-field">
      <label tuiLabel>
        <span>
          Driver loyalty
          <tui-icon [tuiTooltip]="loyaltyTooltip" />
        </span>
        <tui-textfield tuiTextfieldSize="m">
          <input tuiInputNumber [formControl]="teamForm.controls.driver_loyalty" />
        </tui-textfield>
      </label>
      <tui-error [formControl]="teamForm.controls.driver_loyalty" />
    </div>

    <div class="form-field">
      <label tuiLabel>
        <span>
          Expectation level
          <tui-icon [tuiTooltip]="expectationLevelTooltip" />
        </span>
        <tui-textfield tuiTextfieldSize="m">
          <input tuiInputNumber [formControl]="teamForm.controls.expectation_level" />
        </tui-textfield>
      </label>
      <tui-error [formControl]="teamForm.controls.expectation_level" />
    </div>

    <div class="form-field">
      <label tuiLabel>
        <span>
          Performance rating
          <tui-icon [tuiTooltip]="performanceRatingTooltip" />
        </span>
        <tui-textfield tuiTextfieldSize="m">
          <input tuiInputNumber [formControl]="teamForm.controls.performance_rating" />
        </tui-textfield>
      </label>
      <tui-error [formControl]="teamForm.controls.performance_rating" />
    </div>
  </fieldset>

  <fieldset>
    <div class="form-field">
      <label tuiLabel>
        <span>
          Engineering weight
          <tui-icon [tuiTooltip]="engineeringTooltip" />
        </span>
        <tui-textfield tuiTextfieldSize="m">
          <input tuiInputNumber [formControl]="teamForm.controls.engineering_weight" />
        </tui-textfield>
      </label>
      <tui-error [formControl]="teamForm.controls.engineering_weight" />
    </div>

    <div class="form-field">
      <label tuiLabel>
        <span>
          Engineering drag
          <tui-icon [tuiTooltip]="engineeringTooltip" />
        </span>
        <tui-textfield tuiTextfieldSize="m">
          <input tuiInputNumber [formControl]="teamForm.controls.engineering_drag" />
        </tui-textfield>
      </label>
      <tui-error [formControl]="teamForm.controls.engineering_drag" />
    </div>

    <div class="form-field">
      <label tuiLabel>
        <span>
          Engineering power
          <tui-icon [tuiTooltip]="engineeringTooltip" />
        </span>
        <tui-textfield tuiTextfieldSize="m">
          <input tuiInputNumber [formControl]="teamForm.controls.engineering_power" />
        </tui-textfield>
      </label>
      <tui-error [formControl]="teamForm.controls.engineering_power" />
    </div>
  </fieldset>

  <button tuiButton type="submit" size="m">Save</button>
</form>
